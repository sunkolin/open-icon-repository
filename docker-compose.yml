version: '3.8'

services:
  open-icon-repository:
    build: .
    container_name: open-icon-repository
    ports:
      - "6024:6024"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:6024"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
